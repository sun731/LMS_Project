{% extends "base.html" %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h3>My Profile</h3>

        </div>

        <div class="card-body">

            <table class="table table-bordered">

                <tr>
                    <th>ID</th>
                    <td>{{ student[0] }}</td>
                </tr>

                <tr>
                    <th>Name</th>
                    <td>{{ student[1] }}</td>
                </tr>

                <tr>
                    <th>Email</th>
                    <td>{{ student[2] }}</td>
                </tr>

                <tr>
                    <th>Role</th>
                    <td>{{ student[4]|capitalize }}</td>
                </tr>

            </table>

        </div>

    </div>

</div>

{% endblock %}
