{% extends "base.html" %}

{% block content %}

<h2>My Courses</h2>

<hr>

{% if courses %}

<table class="table table-bordered">

    <thead class="table-dark">

        <tr>

            <th>Course Name</th>
            <th>Instructor</th>
            <th>Description</th>

        </tr>

    </thead>

    <tbody>

        {% for course in courses %}

        <tr>

            <td>{{ course[0] }}</td>
            <td>{{ course[1] }}</td>
            <td>{{ course[2] }}</td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% else %}

<div class="alert alert-info">

You are not enrolled in any courses yet.

</div>

{% endif %}

{% endblock %}
