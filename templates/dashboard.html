{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Welcome, {{ student }}</h2>

    <hr>

    <div class="row">

        <div class="col-md-3">

            <div class="card text-white bg-primary mb-3">

                <div class="card-body">

                    <h5>Total Students</h5>

                    <h2>{{ students }}</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-white bg-success mb-3">

                <div class="card-body">

                    <h5>Total Courses</h5>

                    <h2>{{ courses }}</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-white bg-warning mb-3">

                <div class="card-body">

                    <h5>Total Enrollments</h5>

                    <h2>{{ enrollments }}</h2>

                </div>

            </div>

        </div>

        <div class="col-md-3">

            <div class="card text-white bg-danger mb-3">

                <div class="card-body">

                    <h5>Total Materials</h5>

                    <h2>{{ materials }}</h2>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
