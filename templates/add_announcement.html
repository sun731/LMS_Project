{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Post Announcement</h2>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">Title</label>

        <input
            type="text"
            name="title"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">Message</label>

        <textarea
            name="message"
            rows="6"
            class="form-control"
            required></textarea>

    </div>

    <button class="btn btn-success">
        Post Announcement
    </button>

</form>

{% endblock %}
