{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-8">

<div class="card shadow">

<div class="card-header bg-warning">

<h3>Edit Course</h3>

</div>

<div class="card-body">

<form method="POST">

<div class="mb-3">

<label class="form-label">Course Name</label>

<input
type="text"
name="course_name"
class="form-control"
value="{{ course[1] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">Instructor</label>

<input
type="text"
name="instructor"
class="form-control"
value="{{ course[2] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">Description</label>

<textarea
name="description"
class="form-control"
rows="5"
required>{{ course[3] }}</textarea>

</div>

<button class="btn btn-warning">

Update Course

</button>

</form>

</div>

</div>

</div>

</div>

{% endblock %}
